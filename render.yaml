services:
  - type: web
    name: afara-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MODEL_PROVIDER
        value: stub
      - key: CORS_ORIGINS
        value: "*"
      # - key: OPENAI_API_KEY
      #   sync: false
